<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Калькулятор фановой трубы</title>
<style>
    body {
        font-family: Arial;
        padding: 20px;
        max-width: 500px;
    }

    input {
        width: 100px;
        margin: 5px;
    }

    button {
        padding: 10px;
        margin-top: 10px;
    }

    #result {
        margin-top: 20px;
        font-size: 20px;
    }
</style>
</head>
<body>

<h2>Расчёт вылета унитаза</h2>

<div>
    Высота трубы у стены:
    <input id="h1" value="59">
</div>

<div>
    Высота выхода унитаза:
    <input id="h2" value="150">
</div>

<div>
    Угол первой трубы:
    <input id="a1" value="45">
</div>

<div>
    Угол второй трубы:
    <input id="a2" value="30">
</div>

<button onclick="calc()">Посчитать</button>

<div id="result"></div>

<script>
function calc() {

    const h1 = parseFloat(document.getElementById('h1').value);
    const h2 = parseFloat(document.getElementById('h2').value);

    const a1 = parseFloat(document.getElementById('a1').value);
    const a2 = parseFloat(document.getElementById('a2').value);

    const deltaH = Math.abs(h2 - h1);

    const rad1 = a1 * Math.PI / 180;
    const rad2 = a2 * Math.PI / 180;

    const distance =
        deltaH / (Math.tan(rad1) + Math.tan(rad2));

    document.getElementById('result').innerHTML =
        `Горизонтальное расстояние: ${distance.toFixed(2)} мм`;
}
</script>

</body>
</html>
